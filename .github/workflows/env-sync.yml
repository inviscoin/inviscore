name: Environment Sync and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Generate .env file for Vercel Build
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "VERCEL_PROJECT_ID=${{ secrets.VERCEL_PROJECT_ID }}" >> .env
          echo "GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}" >> .env
          echo "GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}" >> .env
          echo "PUBLIC_TMDB_V3_KEY=${{ secrets.PUBLIC_TMDB_V3_KEY }}" >> .env
          echo "OPENSUBTITULE_API_KEY=${{ secrets.OPENSUBTITULE_API_KEY }}" >> .env
          echo "VITE_VERCEL_TEAM_ID=${{ secrets.VITE_VERCEL_TEAM_ID }}" >> .env
          echo "VITE_CLOUDFLARE_ACCOUNT_ID=${{ secrets.VITE_CLOUDFLARE_ACCOUNT_ID }}" >> .env
          echo "VITE_CLOUDFLARE_API_TOKEN=${{ secrets.VITE_CLOUDFLARE_API_TOKEN }}" >> .env
          echo "VITE_FACEBOOK_APP_ID=${{ secrets.VITE_FACEBOOK_APP_ID }}" >> .env
          echo "VITE_FACEBOOK_APP_SECRET=${{ secrets.VITE_FACEBOOK_APP_SECRET }}" >> .env
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" >> .env
          echo "VITE_GOOGLE_CLIENT_SECRET=${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}" >> .env
          echo "VITE_LIVEKIT_URL=${{ secrets.VITE_LIVEKIT_URL }}" >> .env
          echo "VITE_LIVEKIT_API_KEY=${{ secrets.VITE_LIVEKIT_API_KEY }}" >> .env
          echo "VITE_LIVEKIT_API_SECRET=${{ secrets.VITE_LIVEKIT_API_SECRET }}" >> .env
          echo "VITE_METERED_DOMAIN=${{ secrets.VITE_METERED_DOMAIN }}" >> .env
          echo "VITE_METERED_SECRET=${{ secrets.VITE_METERED_SECRET }}" >> .env
          echo "VITE_AI_GATEWAY_API_KEY=${{ secrets.VITE_AI_GATEWAY_API_KEY }}" >> .env
          echo "VITE_TMDB_API_READ_TOKEN=${{ secrets.VITE_TMDB_API_READ_TOKEN }}" >> .env
          echo "VITE_STRIPE_PUBLIC_KEY=${{ secrets.VITE_STRIPE_PUBLIC_KEY }}" >> .env
          echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> .env
          echo "VITE_MERCADOPAGO_PUBLIC_KEY=${{ secrets.VITE_MERCADOPAGO_PUBLIC_KEY }}" >> .env
          echo "MERCADOPAGO_ACCESS_TOKEN=${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}" >> .env
          echo "VITE_YOUTUBE_API_KEY=${{ secrets.VITE_YOUTUBE_API_KEY }}" >> .env
          echo "VITE_JAMENDO_CLIENT_ID=${{ secrets.VITE_JAMENDO_CLIENT_ID }}" >> .env

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --archive=tgz --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
